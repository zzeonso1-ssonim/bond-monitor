<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>본드모니터</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="brand-mark"></span>
    <h1>본드모니터</h1>
    <span class="asof" id="asof"></span>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="monitor">일간 모니터링</button>
    <button class="tab" data-view="matrix">섹터 매트릭스</button>
    <button class="tab" data-view="xcurve">심리지표</button>
    <button class="tab" data-view="rv">상대가치</button>
    <button class="tab" data-view="regime">국면별 분석</button>
  </nav>
  <button class="theme-toggle" id="themeToggle" title="라이트/다크 전환">◐</button>
</header>

<main id="main">
  <div class="loading" id="loading">데이터 불러오는 중…</div>
  <section id="view-monitor" class="view active"></section>
  <section id="view-matrix" class="view"></section>
  <section id="view-xcurve" class="view"></section>
  <section id="view-rv" class="view"></section>
  <section id="view-regime" class="view"></section>
</main>

<footer class="foot">
  KOFIA 채권시가평가기준수익률(평가사 평균) · 매일 20:00 KST 자동 갱신 ·
  <a href="https://github.com/zzeonso1-ssonim/bond-spread-system" target="_blank" rel="noopener">bond-spread-system</a>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
